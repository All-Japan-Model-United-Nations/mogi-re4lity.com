name: Check TypeScript and Build on PR

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

# 同じPRの古いチェックをキャンセル
concurrency:
  group: check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: TypeScript type check
      id: typecheck
      run: |
        npm run typecheck 2>&1 | tee typescript-report.txt
        exit ${PIPESTATUS[0]}

    - name: Build project
      id: build
      run: |
        npm run build 2>&1 | tee build-report.txt
        exit ${PIPESTATUS[0]}

    - name: Comment Test Results on PR
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
      with:
        script: |
          const fs = require('fs');
          let report = '## Build Test Results\n';

          if (fs.existsSync('typescript-report.txt')) {
            report += '\n### TypeScript Check\n```\n' +
              fs.readFileSync('typescript-report.txt', 'utf8') + '\n```\n';
          }

          if (fs.existsSync('build-report.txt')) {
            report += '\n### Build Output\n```\n' +
              fs.readFileSync('build-report.txt', 'utf8') + '\n```\n';
          }

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: report
          });
